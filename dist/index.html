<!-- @format -->

<!doctype html>
<html lang="en" class="font-mono font-medium md:text-base">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YourReceipt | Home</title>
    <link rel="stylesheet" href="style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body class="bg-gray-#ffffff 100vh">
    <header class="p-1.5">
      <div class="flex flex-row justify-between w-full mx-auto max-w-120">
        <div class="">
          <div class="text-lg">Your<b>Receipt</b></div>
          <small>Simple receipt professional results</small>
        </div>
        <div class="">
          <button
            type="button"
            class="border border-gray-300 text-gray-600 text-sm md:text-base rounded px-1.5 py-0.5 cursor-pointer hover:bg-gray-100"
          >
            Print
          </button>
          <button
            type="button"
            class="border font-mono border-gray-300 text-gray-600 text-xs md:text-base rounded px-2.5 py-0.5 cursor-pointer hover:bg-gray-100"
          >
            Save
          </button>
        </div>
      </div>
    </header>
    <main>
      <div
        class="container w-full mx-auto max-w-120 border border-[#d7dadd] rounded"
      >
        <form class="p-2 overflow-x-auto">
          <div class="text-xl text-gray-950 p-1 mb-3 font-mono">
            CREATE INVOICE
          </div>
          <div class="text-gray-950 text-lg">Business Info</div>
          <!-- business name -->
          <div class="flex items-center gap-2.5">
            <label for="business-name" class="text-gray-400"
              >Business Name
            </label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="business-name"
            />
          </div>
          <!-- Address -->
          <div class="flex items-center gap-2.5">
            <label for="address" class="text-gray-400">Address</label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="address"
            />
          </div>
          <!-- Email -->
          <div class="flex items-center gap-2.5">
            <label for="email" class="text-gray-400">Email</label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="email"
            />
          </div>
          <!-- Phone -->
          <div class="flex items-center gap-2.5">
            <label for="text" class="text-gray-400">Phone</label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="text"
            />
          </div>
          <!-- customer info -->
          <div class="text-gray-950 text-lg mt-3">Customer Info</div>
          <div class="flex items-center gap-2.5">
            <label for="business-name" class="text-gray-400"
              >Customer Name
            </label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="business-name"
            />
          </div>

          <div class="flex items-center gap-2.5">
            <label for="address" class="text-gray-400">Customer Address</label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="address"
            />
          </div>
          <!-- invoice details -->

          <div class="text-gray-950 text-lg mt-3">Invoice Details</div>
          <div class="flex items-center gap-2.5">
            <label for="business-name" class="text-gray-400"
              >Invoice Number
            </label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="business-name"
            />
          </div>

          <div class="flex items-center gap-2.5">
            <label for="address" class="text-gray-400">Invoice Date</label>
            <input
              type="text"
              class="border border-gray-500 focus:border-gray-400 focus:border-2 text-sm block py-1 px-1.5"
              id="address"
            />
          </div>

          <!-- items -->
          <div class="mt-3 text-lg">Items</div>
          <table
            class="border-collapse w-full border border-gray-400 table-fixed"
          >
            <thead>
              <tr class="border-b border-gray-400">
                <th class="text-gray-400 font-light text-center w-[38%]">
                  Description
                </th>
                <th class="text-gray-400 font-light text-center w-[12%]">
                  Qty
                </th>
                <th class="text-gray-400 font-light text-center w-[18%]">
                  Unit Price
                </th>
                <th class="text-gray-400 font-light text-center w-[18%]">
                  Amount
                </th>
                <th class="text-gray-400 font-light text-center w-[14%]">
                  Remove
                </th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border border-gray-400 p-1.5">
                  <input
                    class="border border-gray-400 w-full px-2 py-1"
                    type="text"
                    id="item-desc"
                    placeholder=""
                  />
                </td>
                <td class="border border-gray-400 p-1.5">
                  <input
                    class="border border-gray-400 w-full px-2 py-1"
                    type="number"
                    min="1"
                    id="item-qty"
                    placeholder=""
                  />
                </td>
                <td class="border border-gray-400 p-1.5">
                  <input
                    class="border border-gray-400 w-full px-2 py-1"
                    type="text"
                    id="item-price"
                    placeholder=""
                  />
                </td>
                <td
                  class="text-center whitespace-nowrap font-bold"
                  id="item-amount"
                >
                  0.00
                </td>

                <td class="border border-gray-400 p-1.5 text-center">
                  <button
                    id="remove-btn"
                    type="button"
                    class="border text-center border-red-400 text-red-500 w-full rounded 
                    px-1 py-0.5 text-sm hover:bg-red-200 hover:cursor-pointer"
                  >
                    X
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          <button
            type="button"
            class=" bg-blue-600 text-white text-sm mt-1 px-1 py-0.5 rounded hover:bg-blue-500 hover:cursor-pointer"
          >
            Add Item
          </button>

          <!-- charges -->
           <div class="mt-3 text-lg text-gray-950">Charges</div>
          <div class="charges-section flex">
            <label for="tax" class="text-gray-400">Tax %</label>
            <input
              type="number"
              id="tax"
              class="border border-gray-400 focus:border-2 rounded px-2 py-1 w-full text-sm"
            />
          </div>
          <div class="flex">
            <label for="discount" class="text-gray-400">Discount</label>
            <input
              type="number"
              id="discount"
              class="border border-gray-400 focus:border-2 rounded px-2 py-1 w-full text-sm"
            />
          </div>

          <div class="action">
            <button type="button" class="border font-medium p-0.5">
              Generate Invoice
            </button>
            <button type="button" class="border font-medium p-0.5">
              Reset
            </button>
          </div>
        </form>
      </div>
    </main>
    <footer class="text-right">
      <div>Generate invoice with yourreceipt</div>
    </footer>
  </body>
</html>
