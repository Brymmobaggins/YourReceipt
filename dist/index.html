<!-- @format -->

<!doctype html>
<html lang="en" class="font-mono font-medium md:text-base">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YourReceipt | Home</title>
    <link rel="stylesheet" href="style.css" />
    <script src="/js/main.js" defer></script>
  </head>
  <body class="bg-gray-#ffffff 100vh">
    <header class="p-2.5 border-b border-gray-300 mb-3">
      <div class="flex items-start justify-between mb-6">
        <div>
          <h1 class="text-2xl font-semibold">Your<b>Receipt</b></h1>
          <p class="text-xs text-gray-950">
            Simple receipt professional results
          </p>
        </div>
        <div class="flex gap-3">
          <button
            type="button"
            class="text-sm px-3 py-2 border border-gray-300 text-gray-700 rounded hover:bg-gray-100 transition hover:cursor-pointer"
          >
            Save
          </button>

          <button
            type="button"
            class="text-sm px-3 py-2 border border-blue-200 bg-blue-50 text-blue-700 rounded hover:bg-blue-100 transition hover:cursor-pointer"
          >
            Print
          </button>
        </div>
      </div>
    </header>
    <main class="flex gap-5 mx-auto max-w-200">
      <div class="container w-full border border-gray-300 rounded flex-1">
        <form class="p-2">
          <div class="text-xl font-bold text-gray-950 p-1 mb-3 font-mono">
            CREATE INVOICE
          </div>
          <div class="text-gray-950 text-lg">Business Info</div>
          <!-- business name -->
          <div class="flex items-center gap-2">
            <label for="business-name" class="text-gray-400"
              >Business Name
            </label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="business-name"
            />
          </div>
          <!-- Address -->
          <div class="flex items-center gap-2.5">
            <label for="address" class="text-gray-400">Address</label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="business-address"
            />
          </div>
          <!-- Email -->
          <div class="flex items-center gap-2.5">
            <label for="email" class="text-gray-400">Email</label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="business-email"
            />
          </div>
          <!-- Phone -->
          <div class="flex items-center gap-2.5">
            <label for="text" class="text-gray-400">Phone</label>
            <input
              type="number"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="business-phone"
            />
          </div>
          <!-- customer info -->
          <div class="text-gray-950 text-lg mt-3">Customer Info</div>
          <div class="flex items-center gap-2.5">
            <label for="business-name" class="text-gray-400"
              >Customer Name
            </label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="business-name"
            />
          </div>

          <div class="flex items-center gap-2.5">
            <label for="address" class="text-gray-400">Customer Address</label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="address"
            />
          </div>
          <!-- invoice details -->

          <div class="text-gray-950 text-lg mt-3">Invoice Details</div>
          <div class="flex items-center gap-2.5">
            <label for="business-name" class="text-gray-400"
              >Invoice Number
            </label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="business-name"
            />
          </div>

          <div class="flex items-center gap-2.5">
            <label for="address" class="text-gray-400">Invoice Date</label>
            <input
              type="text"
              class="border border-gray-400 focus:border-gray-500 focus:border-2 text-sm block py-1 px-2 w-full"
              id="address"
            />
          </div>

          <!-- items -->
          <div class="mt-3 text-lg">Items</div>
          <table
            class="border-collapse w-full border border-gray-400 table-fixed"
          >
            <thead>
              <tr class="border-b border-gray-400">
                <th class="text-gray-400 font-light text-center w-[38%]">
                  Description
                </th>
                <th class="text-gray-400 font-light text-center w-[12%]">
                  Qty
                </th>
                <th class="text-gray-400 font-light text-center w-[18%]">
                  Unit Price
                </th>
                <th class="text-gray-400 font-light text-center w-[18%]">
                  Amount
                </th>
                <th class="text-gray-400 font-light text-center w-[14%]">
                  Remove
                </th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border border-gray-400 p-1.5">
                  <input
                    class="border border-gray-400 w-full px-2 py-1"
                    type="text"
                    id="item-desc"
                    placeholder=""
                  />
                </td>
                <td class="border border-gray-400 p-1.5">
                  <input
                    class="border border-gray-400 w-full px-2 py-1"
                    type="number"
                    min="1"
                    id="item-qty"
                    placeholder=""
                  />
                </td>
                <td class="border border-gray-400 p-1.5">
                  <input
                    class="border border-gray-400 w-full px-2 py-1"
                    type="text"
                    id="item-price"
                    placeholder=""
                  />
                </td>
                <td
                  class="text-center whitespace-nowrap font-bold"
                  id="item-amount"
                >
                  0.00
                </td>

                <td class="border border-gray-400 p-1.5 text-center">
                  <button
                    id="remove-btn"
                    type="button"
                    class="border text-center border-red-200 text-red-700 w-full rounded px-1 py-0.5 text-sm hover:bg-red-100 hover:cursor-pointer"
                  >
                    X
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          <div class="mt-2">
            <button
              type="button"
              class="border border-blue-200 mt-1 px-1.5 py-1 text-sm text-blue-700 rounded hover:cursor-pointer hover:bg-blue-100 transition"
            >
              + Add Item
            </button>
          </div>

          <!-- charges -->
          <div class="mt-3 text-lg text-gray-950">Charges</div>
          <div class="charges-section flex">
            <label for="tax" class="text-gray-400">Tax %</label>
            <input
              type="number"
              id="tax"
              class="border border-gray-400 focus:border-2 rounded px-2 py-1 w-full text-sm"
            />
          </div>
          <div class="flex">
            <label for="discount" class="text-gray-400">Discount</label>
            <input
              type="number"
              id="discount"
              class="border border-gray-400 focus:border-2 rounded px-2 py-1 w-full text-sm"
            />
          </div>

          <div class="action">
            <button
              type="button"
              class="border border-gray-300 text-gray-700 px-3 rounded text-sm py-2 hover:bg-gray-100 hover:cursor-pointer transition"
            >
              Reset
            </button>
            <button
              type="button"
              class="bg-blue-600 text-white text-sm px-3 py-2 rounded hover:bg-blue-700 hover:cursor-pointer transition"
            >
              Generate Invoice
            </button>
          </div>
        </form>
      </div>
      <!-- live Preview -->
      <div class="flex-1 border border-gray-300 p-2 rounded">
        <div class="text-xl font-bold text-gray-950 p-1 mb-3 font-mono">
          LIVE PREVIEW
        </div>
        <div class="mt-3">
          <h2 class="text-gray-600 text-sm" id="preview-business-name">
            Business Name
          </h2>

          <p class="text-gray-600 text-sm" id="preview-business-address">
            Business Address
          </p>
          <p class="text-gray-600 text-sm" id="preview-business-email">
            Business Email
          </p>
          <p class="text-gray-600 text-sm" id="preview-phone-number">
            Business Phone number
          </p>
        </div>
      </div>
    </main>

    <footer class="text-right p-2 mt-4">
      <div>Generate invoice with yourreceipt</div>
    </footer>
  </body>
</html>
